name: Refresh intelligence data

on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: Refresh mode
        required: true
        default: incremental
        type: choice
        options:
          - incremental
          - backfill

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: agent-pulse-repository-data-main
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      DATABASE_URL: sqlite:./var/automation.db
      PUBLIC_SITE_URL: https://barretlee.github.io/agent-pulse/
      REFRESH_MODE: ${{ inputs.mode || 'incremental' }}
    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Restore auditable repository snapshot
        run: npm run db:snapshot -- restore

      - name: Collect and cluster signals
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$REFRESH_MODE" == "backfill" ]]; then
            npm run collect -- --backfill
          else
            npm run collect
          fi

      - name: Reconcile sources and source radar
        run: npm run ops:reconcile

      - name: Reconcile observation and activate qualified sources
        shell: bash
        run: |
          set -euo pipefail
          npm run observe:sources -- --confirm
          npm run activate:auto

      - name: Remove unattached aggregator provenance debt
        run: npm run repair:provenance -- --confirm

      - name: Generate and publish qualified Scout opportunities
        run: npm run scout:generate -- 12

      - name: Publish every Event and Scout item that clears hard gates
        run: npm run auto:publish

      - name: Evaluate measured system quality
        run: npm run evaluate:system | tee "$RUNNER_TEMP/evaluation.json"

      - name: Export public site as a contract check
        run: npm run export -- --skip-seed

      - name: Render today's incremental intelligence brief
        shell: bash
        run: |
          set -euo pipefail
          REPORT_DATE="$(TZ=Asia/Shanghai date +%F)"
          npm run --silent daily:issue -- \
            --timeline dist/data/timeline.json \
            --scout dist/data/scout.json \
            --product dist/data/product.json \
            --date "$REPORT_DATE" \
            --time-zone Asia/Shanghai > "$RUNNER_TEMP/daily-brief.md"
          echo "report_date=$REPORT_DATE" >> "$GITHUB_ENV"

      - name: Write privacy-safe text snapshot
        run: npm run db:snapshot -- write

      - name: Validate snapshot diff
        shell: bash
        run: |
          set -euo pipefail
          test -f data/snapshot/v1.json
          git diff --check -- data/snapshot/v1.json
          if grep -E '"(token|secret|password|cookie|authorization|api[_-]?key)"[[:space:]]*:' data/snapshot/v1.json; then
            echo "Sensitive key detected in repository snapshot" >&2
            exit 1
          fi
          if grep -E -- '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----|/Users/[^/]+/|/home/runner/' data/snapshot/v1.json; then
            echo "Private material or local path detected in repository snapshot" >&2
            exit 1
          fi

      - name: Commit snapshot when data changed
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git add -- data/snapshot/v1.json
          if git diff --cached --quiet; then
            echo "No material data changes; skipping commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): refresh intelligence snapshot"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Upload quality evidence
        uses: actions/upload-artifact@v7
        with:
          name: quality-evidence-${{ github.run_id }}
          path: ${{ runner.temp }}/evaluation.json
          retention-days: 14

      - name: Create or update today's GitHub Issue
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          marker="agent-pulse-daily-brief:${report_date}"
          title="Agent Pulse AI 日报 · ${report_date}"
          gh label create daily-brief --color 6f42c1 --description "Automated daily intelligence brief" 2>/dev/null || true
          issue_number="$(gh issue list --state all --label daily-brief --limit 100 --json number,body \
            --jq ".[] | select(.body | contains(\"$marker\")) | .number" | head -1)"
          if [[ -n "$issue_number" ]]; then
            gh issue edit "$issue_number" --title "$title" --body-file "$RUNNER_TEMP/daily-brief.md" --add-label daily-brief
            gh issue reopen "$issue_number" >/dev/null 2>&1 || true
          else
            gh issue create --title "$title" --body-file "$RUNNER_TEMP/daily-brief.md" --label daily-brief
          fi

      # Pushes made with GITHUB_TOKEN intentionally do not trigger other push workflows.
      - name: Dispatch Pages deployment for the new snapshot
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main
